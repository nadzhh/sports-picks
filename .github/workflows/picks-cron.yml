name: Sport-picks cron

# Tourne toutes les 30 min pour :
# 1. resoudre les picks d'hier (resolver foot + NBA + tennis)
# 2. fetcher les fixtures upcoming + lineups + box scores
# 3. generer les picks
# 4. publier le site GitHub Pages
# 5. envoyer les notifications Telegram 30 min avant chaque match
#
# Quota Github Actions free tier : 2000 min/mois. 48 runs/jour × ~5 min =
# ~7200 min/mois -> au-dessus du free tier, possible overage selon plan.
# Pour rester gratuit, passer a "0 6,12,18,23 * * *" (4 runs/jour).
#
# Secrets requis dans Settings -> Secrets and variables -> Actions :
#   - API_KEY              : cle api-sports.io (football)
#   - ODDS_API_KEY/2/3     : cles the-odds-api.com (NBA props / foot / tennis)
#   - RAPIDAPI_KEY         : Tank01 fantasy stats (NBA injuries)
#   - TELEGRAM_BOT_TOKEN   : token du bot @BotFather
#   - TELEGRAM_CHAT_ID     : chat_id Telegram (notify.py)
#
# Pour declencher manuellement : onglet Actions -> Sport-picks cron -> Run workflow

on:
  schedule:
    - cron: "*/30 * * * *"   # toutes les 30 minutes
  workflow_dispatch:          # bouton "Run workflow" manuel dans l'UI

permissions:
  contents: write

concurrency:
  group: picks-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config --global user.name  "sport-picks-bot"
          git config --global user.email "actions@github.com"

      - name: Install Python deps
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          fi

      - name: Pipeline complet
        env:
          API_KEY:            ${{ secrets.API_KEY }}
          ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
          ODDS_API_KEY2:      ${{ secrets.ODDS_API_KEY2 }}
          ODDS_API_KEY3:      ${{ secrets.ODDS_API_KEY3 }}
          RAPIDAPI_KEY:       ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING:   utf-8
          CAMOUFOX_DISABLE:   "1" 
        run: |
          python foot_resolver.py         || echo "[!] foot_resolver KO"
          python nba_resolver.py          || echo "[!] nba_resolver KO"
          python scraper.py               || echo "[!] scraper foot KO"
          python foot_odds.py             || echo "[!] foot_odds KO"
          python scraper_players_today.py || echo "[!] scraper_players KO"
          python nba_scraper.py           || echo "[!] nba_scraper KO"
          python nba_odds.py              || echo "[!] nba_odds KO"
          python nba_picks_engine.py      || echo "[!] nba_picks_engine KO"
          python tennis_scraper.py        || echo "[!] tennis_scraper KO"
          python tennis_picks_engine.py   || echo "[!] tennis_picks_engine KO"
          python tennis_resolver.py       || echo "[!] tennis_resolver KO"
          python picks_engine.py          || echo "[!] picks_engine KO"
          python generate_site.py         || echo "[!] generate_site KO"
          python picks_history_dump.py    || echo "[!] picks_history_dump KO"
          python analyze_picks.py         || echo "[!] analyze_picks KO"
          python notify.py                || echo "[!] notify KO"
          echo "Pipeline termine"

      - name: Commit master + push gh-pages
        shell: bash
        run: |
          set +e
          echo "=== Stage des fichiers data + index ==="
          git add -f data/*.json index.html 2>/dev/null || true
          git status --short

          if git diff --cached --quiet; then
            echo "No changes to commit, skipping push."
            exit 0
          fi

          git commit -m "Auto-update picks $(date -u +'%Y-%m-%d %H:%M UTC')"
          echo "=== Tentative push master (avec retry) ==="

          PUSH_OK=0
          for i in 1 2 3 4 5; do
            echo "--- Tentative $i ---"
            git fetch origin master
            git pull --rebase --autostash origin master
            REBASE_RC=$?
            if [ $REBASE_RC -ne 0 ]; then
              echo "Rebase failed ($REBASE_RC), abort + reset"
              git rebase --abort 2>/dev/null
              git reset --hard origin/master
              git add -f data/*.json index.html 2>/dev/null
              git commit -m "Auto-update picks $(date -u +'%Y-%m-%d %H:%M UTC')" || true
            fi
            git push origin master
            if [ $? -eq 0 ]; then
              echo "Push master OK (tentative $i)"
              PUSH_OK=1
              break
            fi
            echo "Push echoue (tentative $i), retry dans 3s..."
            sleep 3
          done

          if [ $PUSH_OK -eq 0 ]; then
            echo "[X] Push master a echoue apres 5 tentatives"
            exit 1
          fi

          echo "=== Push gh-pages (forced) ==="
          git push origin master:gh-pages --force
          echo "Done"

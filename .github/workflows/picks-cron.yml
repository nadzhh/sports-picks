name: Sport-picks cron

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: picks-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git
        run: |
          git config --global user.name  "sport-picks-bot"
          git config --global user.email "actions@github.com"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "Pas de requirements.txt - stdlib seulement"
          fi

      - name: Pipeline complet
        env:
          API_KEY:            ${{ secrets.API_KEY }}
          ODDS_API_KEY:       ${{ secrets.ODDS_API_KEY }}
          ODDS_API_KEY2:      ${{ secrets.ODDS_API_KEY2 }}
          ODDS_API_KEY3:      ${{ secrets.ODDS_API_KEY3 }}
          RAPIDAPI_KEY:       ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING:   utf-8

        run: |
          python foot_resolver.py         || echo "[!] foot_resolver KO"
          python nba_resolver.py          || echo "[!] nba_resolver KO"
          python scraper.py               || echo "[!] scraper foot KO"
          python foot_odds.py             || echo "[!] foot_odds KO"
          python scraper_players_today.py || echo "[!] scraper_players KO"
          python nba_scraper.py           || echo "[!] nba_scraper KO"
          python nba_odds.py              || echo "[!] nba_odds KO"
          python nba_picks_engine.py      || echo "[!] nba_picks_engine KO"
          python picks_engine.py          || echo "[!] picks_engine KO"
          python generate_site.py         || echo "[!] generate_site KO"
          python notify.py                || echo "[!] notify KO"
          echo "Pipeline termine"

      - name: Commit master + push gh-pages
        run: |
          git add -f data/*.json index.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update picks $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Retry avec rebase si push echoue (race condition concurrent push)
            for i in 1 2 3 4 5; do
              if git push origin master; then
                echo "Push master OK (try $i)"
                break
              fi
              echo "Push failed (try $i), rebasing on origin/master..."
              git fetch origin master
              git rebase origin/master || {
                echo "Rebase conflit, abort + retry"
                git rebase --abort || true
                git reset --hard origin/master
                # Re-apply local data changes
                git add -f data/*.json index.html 2>/dev/null || true
                git commit -m "Auto-update picks $(date -u +'%Y-%m-%d %H:%M UTC')" --allow-empty || true
              }
              sleep 3
            done
            git push origin master:gh-pages --force
            echo "Pushed to master + gh-pages"
          fi
